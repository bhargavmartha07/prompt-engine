name: few_shot_grammar
description: Correct grammatical mistakes using examples
pattern: few-shot
input_variables:
  - sentence
template: |
  Correct the sentence based on the examples:

  {% for ex in examples %}
  Incorrect: {{ ex.input }}
  Correct: {{ ex.output }}
  {% endfor %}

  Incorrect: {{ sentence }}
  Correct:
examples:
  - input: "He go to school"
    output: "He goes to school"
  - input: "She eat apple"
    output: "She eats an apple"
